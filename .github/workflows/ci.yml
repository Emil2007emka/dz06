name: CI

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM tools
        if: startsWith(github.ref, 'refs/tags/v')
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Configure
        run: cmake -S solver_application -B solver_application/_build -DCMAKE_INSTALL_PREFIX=solver_application/_install

      - name: Build
        run: cmake --build solver_application/_build

      - name: Install
        run: cmake --build solver_application/_build --target install

      - name: Package (CPack)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd solver_application/_build
          cpack -G "DEB;RPM;TGZ"

      - name: Upload Release Artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            solver_application/_build/*.deb
            solver_application/_build/*.rpm
            solver_application/_build/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S solver_application -B solver_application/_build -DCMAKE_INSTALL_PREFIX=solver_application/_install

      - name: Build
        run: cmake --build solver_application/_build --config Release

      - name: Install
        run: cmake --build solver_application/_build --target install --config Release

      - name: Package (CPack)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd solver_application/_build
          cpack -G WIX -C Release

      - name: Upload Release Artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: solver_application/_build/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S solver_application -B solver_application/_build -DCMAKE_INSTALL_PREFIX=solver_application/_install

      - name: Build
        run: cmake --build solver_application/_build

      - name: Install
        run: cmake --build solver_application/_build --target install

      - name: Package (CPack)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd solver_application/_build
          cpack -G DragNDrop -C Release

      - name: Upload Release Artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: solver_application/_build/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
